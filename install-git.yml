---
- name: Install Git on all servers
  hosts: servers
  become: yes

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Git
      apt:
        name: git
        state: present

    - name: Verify Git installation
      command: git --version
      register: git_output

    - name: Display Git version
      debug:
        var: git_output.stdout
